  /* Initial suggested questions shown before any conversation */
  const INITIAL_SUGGESTIONS = [
    'What is EPCVIP?',
    'How much do publishers earn?',
    'How do I buy leads?',
    'What verticals do you cover?',
    'How do I get started?'
  ];

  /* Fallback message when no topic matches */
  const FALLBACK = "I can help with questions about EPCVIP's publisher program, advertiser leads, EPC rates, verticals, technology, compliance, or how to join. Try asking something like \"What are your EPC rates?\" or \"How do I sign up as a publisher?\"";

  /* ── MATCHING ENGINE ──────────────────────────────────────────────── */
  function normalize(str) {
    return str.toLowerCase().replace(/[^a-z0-9\s]/g, ' ').replace(/\s+/g, ' ').trim();
  }

  function findBestMatch(query) {
    const q = normalize(query);
    const words = q.split(' ').filter(w => w.length > 2);
    if (!words.length) return null;

    let best = null, bestScore = 0;

    for (const topic of KB) {
      let score = 0;

      /* Multi-word phrase match (highest priority) */
      for (const trigger of topic.triggers) {
        if (trigger.includes(' ') && q.includes(trigger)) {
          score += 8;
        }
      }

      /* Word-level matching */
      for (const word of words) {
        for (const trigger of topic.triggers) {
          if (trigger === word) {
            score += 3; /* exact word match */
          } else if (trigger.length > 3 && trigger.includes(word)) {
            score += 1; /* word is substring of trigger */
          } else if (word.length > 4 && word.includes(trigger)) {
            score += 1; /* trigger is substring of query word */
          }
        }
      }

      if (score > bestScore) {
        bestScore = score;
        best = topic;
      }
    }

    /* Require at least a score of 2 to avoid false positives */
    return bestScore >= 2 ? best : null;
  }

  /* ── DOM REFS ─────────────────────────────────────────────────────── */
  const toggle      = document.getElementById('epcvip-toggle');
  const win         = document.getElementById('epcvip-window');
  const closeBtn    = document.getElementById('epcvip-close');
  const messages    = document.getElementById('epcvip-messages');
  const typingEl    = document.getElementById('epcvip-typing');
  const suggestBox  = document.getElementById('epcvip-suggestions');
  const chipsEl     = document.getElementById('epcvip-chips');
  const input       = document.getElementById('epcvip-input');
  const sendBtn     = document.getElementById('epcvip-send');
  const badge       = document.getElementById('epcvip-badge');

  let isOpen = false;
  let hasGreeted = false;

  /* ── OPEN / CLOSE ─────────────────────────────────────────────────── */
  function openChat() {
    isOpen = true;
    win.classList.add('open');
    toggle.classList.add('open');
    badge.classList.add('hidden');
    if (!hasGreeted) {
      hasGreeted = true;
      setTimeout(showGreeting, 200);
    } else {
      input.focus();
    }
  }

  function closeChat() {
    isOpen = false;
    win.classList.remove('open');
    toggle.classList.remove('open');
  }

  toggle.addEventListener('click', () => isOpen ? closeChat() : openChat());
  closeBtn.addEventListener('click', closeChat);

  /* Close on Escape */
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && isOpen) closeChat(); });

  /* ── GREETING ─────────────────────────────────────────────────────── */
  function showGreeting() {
    showTyping();
    setTimeout(() => {
      hideTyping();
      appendBot(
        'Welcome to EPCVIP',
        'Hi! I\'m the EPCVIP assistant. I can answer questions about our <strong>publisher program</strong>, <strong>advertiser leads</strong>, EPC rates, technology, compliance, and how to join the network.\n\nWhat would you like to know?'
      );
      setChips(INITIAL_SUGGESTIONS);
      setTimeout(() => input.focus(), 100);
    }, 900);
  }

  /* ── MESSAGES ─────────────────────────────────────────────────────── */
  function appendBot(topic, html) {
    const row = document.createElement('div');
    row.className = 'epc-msg-row bot';

    const avt = document.createElement('div');
    avt.className = 'epc-msg-avt';
    avt.textContent = 'EV';

    const bubble = document.createElement('div');
    bubble.className = 'epc-bubble';

    if (topic) {
      const label = document.createElement('div');
      label.className = 'epc-bubble-topic';
      label.textContent = topic;
      bubble.appendChild(label);
    }

    /* Convert plain newlines to <br> */
    const bodyHtml = html.replace(/\n/g, '<br>');
    const body = document.createElement('div');
    body.innerHTML = bodyHtml;
    bubble.appendChild(body);

    row.appendChild(avt);
    row.appendChild(bubble);
    messages.appendChild(row);
    scrollBottom();
  }

  function appendUser(text) {
    const row = document.createElement('div');
    row.className = 'epc-msg-row user';
    const bubble = document.createElement('div');
    bubble.className = 'epc-bubble';
    bubble.textContent = text;
    row.appendChild(bubble);
    messages.appendChild(row);
    scrollBottom();
  }

  function scrollBottom() {
    requestAnimationFrame(() => {
      messages.scrollTop = messages.scrollHeight;
    });
  }

  /* ── TYPING INDICATOR ─────────────────────────────────────────────── */
  function showTyping() {
    typingEl.classList.add('visible');
    scrollBottom();
  }

  function hideTyping() {
    typingEl.classList.remove('visible');
  }

  /* ── SUGGESTIONS / CHIPS ──────────────────────────────────────────── */
  function setChips(questions) {
    chipsEl.innerHTML = '';
    suggestBox.style.display = questions.length ? '' : 'none';
    questions.forEach(q => {
      const chip = document.createElement('button');
      chip.className = 'epc-chip';
      chip.textContent = q;
      chip.addEventListener('click', () => handleSend(q));
      chipsEl.appendChild(chip);
    });
  }

  /* ── SEND / RESPOND ───────────────────────────────────────────────── */
  function handleSend(text) {
    const q = (text || input.value).trim();
    if (!q) return;

    /* Reset input */
    input.value = '';
    sendBtn.disabled = true;
    setChips([]); /* clear suggestions while thinking */

    appendUser(q);
    showTyping();

    /* Simulate natural response delay (600-1200ms based on answer length) */
    const match = findBestMatch(q);
    const delay = match ? Math.min(600 + match.answer.length * 0.6, 1400) : 800;

    setTimeout(() => {
      hideTyping();
      if (match) {
        appendBot(match.title, match.answer);
        setChips(match.follow || []);
      } else {
        appendBot('Not sure about that', FALLBACK);
        setChips(INITIAL_SUGGESTIONS);
      }
      input.focus();
    }, delay);
  }

  /* ── INPUT EVENTS ─────────────────────────────────────────────────── */
  input.addEventListener('input', () => {
    sendBtn.disabled = input.value.trim().length === 0;
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey && input.value.trim()) {
      e.preventDefault();
      handleSend();
    }
  });

  sendBtn.addEventListener('click', () => handleSend());

  /* ── AUTO-OPEN AFTER DELAY (optional: remove if unwanted) ─────────── */
  /* Uncomment the lines below to auto-open the chat after 8 seconds:
  setTimeout(() => {
    if (!isOpen) openChat();
  }, 8000);
  */

})();
</script>
